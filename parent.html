<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student Progress</title>
<style>
  :root { --bg:#0f1116; --card:#1a1d26; --border:#2a2e3a; --text:#e8eaf0; --dim:#9aa0b0; --accent:#5b8dee; --good:#4ade80; --mid:#f6a623; --low:#ff6b6b; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,Segoe UI,Roboto,sans-serif; padding:20px; }
  .wrap { max-width:560px; margin:0 auto; }
  h1 { font-size:20px; margin:0 0 2px; }
  .sub { color:var(--dim); font-size:13px; margin-bottom:18px; }
  .cards { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
  .stat { flex:1; min-width:120px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; }
  .stat .n { font-size:26px; font-weight:800; }
  .stat .l { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; }
  .section { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:14px; }
  .section h2 { font-size:13px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; margin:0 0 12px; }
  .bar-row { margin-bottom:12px; }
  .bar-top { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
  .bar-track { height:7px; background:var(--border); border-radius:4px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:4px; }
  .muted { color:var(--dim); font-size:13px; }
  .err { text-align:center; padding:40px 20px; color:var(--dim); }
  footer { text-align:center; color:var(--dim); font-size:11px; margin-top:20px; }
</style>
</head>
<body>
<div class="wrap" id="app"><div class="err">Loading…</div></div>
<footer>Read-only view · Spanish Lab</footer>
<script>
(async function () {
  const app = document.getElementById('app');
  const p = new URLSearchParams(location.search);
  const sid = p.get('sid'), token = p.get('token');
  const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const color = a => a >= 80 ? 'var(--good)' : a >= 60 ? 'var(--mid)' : 'var(--low)';
  const ago = iso => { if (!iso) return 'never'; const m = Math.round((Date.now() - new Date(iso).getTime())/60000); if (isNaN(m)) return '?'; if (m < 60) return m + ' min ago'; const h = Math.round(m/60); if (h < 24) return h + 'h ago'; return Math.round(h/24) + 'd ago'; };
  if (!sid || !token) { app.innerHTML = '<div class="err">This link is missing its access code. Ask the teacher for the full link.</div>'; return; }
  try {
    const r = await fetch('/api/parent?studentId=' + encodeURIComponent(sid) + '&token=' + encodeURIComponent(token));
    const d = await r.json();
    if (d.pending) { app.innerHTML = '<div class="err">No progress recorded yet — check back after the first practice session.</div>'; return; }
    if (!r.ok || !d.student) { app.innerHTML = '<div class="err">This link isn’t valid. Please ask the teacher for a new one.</div>'; return; }
    const s = d.student;
    const NAMES = { 'ser-estar':'Ser vs Estar','gender':'Gender & Agreement','present':'Present Tense','tu-usted':'Tú vs Usted','gustar':'Gustar','word-order':'Word Order','reflexive':'Reflexives','obj-pronouns':'Object Pronouns','por-para':'Por vs Para','pret-imp':'Preterite vs Imperfect','subjunctive':'Subjunctive' };
    const rows = Object.keys(s.mastery || {}).map(k => { const m = s.mastery[k]; return '<div class="bar-row"><div class="bar-top"><span>' + esc(NAMES[k] || k) + '</span><span style="color:' + color(m.acc) + ';font-weight:700">' + m.acc + '%</span></div><div class="bar-track"><div class="bar-fill" style="width:' + m.acc + '%;background:' + color(m.acc) + '"></div></div></div>'; }).join('');
    app.innerHTML =
      '<h1>' + esc(s.name) + '</h1>' +
      '<div class="sub">Last practiced ' + ago(s.lastActive) + (s.topic ? ' · currently on <strong>' + esc(s.topic) + '</strong>' + (s.topicNum ? ' (topic ' + s.topicNum + ')' : '') : '') + '</div>' +
      '<div class="cards">' +
        '<div class="stat"><div class="n">' + s.level + '</div><div class="l">Level</div></div>' +
        '<div class="stat"><div class="n">' + s.xp + '</div><div class="l">Total XP</div></div>' +
        '<div class="stat"><div class="n">' + s.bestStreak + '</div><div class="l">Best streak</div></div>' +
      '</div>' +
      '<div class="section"><h2>Progress by topic</h2>' + (rows || '<div class="muted">No topic practice recorded yet.</div>') + '</div>';
  } catch (e) {
    app.innerHTML = '<div class="err">Couldn’t load progress right now. Please try again later.</div>';
  }
})();
</script>
</body>
</html>
